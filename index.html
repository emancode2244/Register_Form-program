<!DOCTYPE html>
<html>
<head>
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/form icon.png">
</head>
<body>

<div id="registerBox">
    <h2>Register</h2>
    <input id="regName" placeholder="Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" placeholder="Password">
    <button onclick="register()">Register</button>
    <p onclick="showLogin()">Go to Login</p>
</div>

<div id="loginBox" style="display:none;">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p onclick="showRegister()">Go to Register</p>
</div>

<script src="script.js"></script>
</body>
</html>
