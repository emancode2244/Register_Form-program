<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <!-- Toggle Buttons -->
        <div class="tabs">
            <button id="loginTab" class="active" onclick="showLogin()">Login</button>
            <button id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <!-- Login -->
        <div id="loginForm" class="form active">
            <h2>Welcome Back 👋</h2>

            <div class="input-box">
                <input id="loginEmail" type="email" required oninput="checkInput(this)">
                <label>Email</label>
            </div>

            <div class="input-box">
                <input id="loginPass" type="password" required oninput="checkInput(this)">
                <label>Password</label>
                <span onclick="togglePassword('loginPass')"></span>
            </div>

            <p class="error" id="loginError"></p>

            <button onclick="login()">Login</button>
        </div>

        <!-- Register -->
        <div id="registerForm" class="form">
            <h2>Create Account ✨</h2>

            <div class="input-box">
                <input id="regName" type="text" required oninput="checkInput(this)">
                <label>Full Name</label>
            </div>

            <div class="input-box">
                <input id="regEmail" type="email" required oninput="checkInput(this)">
                <label>Email</label>
            </div>

            <div class="input-box">
                <input id="regPass" type="password" required oninput="checkInput(this)">
                <label>Password</label>
                <span onclick="togglePassword('regPass')"></span>
            </div>

            <p class="error" id="regError"></p>

            <button onclick="register()">Register</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
